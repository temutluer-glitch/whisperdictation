name: WhisperDictation
options:
  bundleIdPrefix: com.innosolv
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.0

targets:
  WhisperDictation:
    type: application
    platform: macOS
    sources:
      - path: Sources/WhisperDictation
    dependencies:
      - package: HotKey
    info:
      path: SupportingFiles/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "WhisperDictation nutzt dein Mikrofon, um Sprache für die Transkription aufzuzeichnen."
        NSAppleEventsUsageDescription: "WhisperDictation fügt transkribierten Text per Tastatur-Simulation in die aktive App ein."
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "© 2026 Timur Mutluer"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innosolv.WhisperDictation
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
