# ACHTUNG: ${WD_*}-Platzhalter werden von tools/render-project-yml.sh ersetzt.
# Direkt `xcodegen generate` aufzurufen würde die Platzhalter literal übernehmen
# und ein kaputtes Xcode-Projekt erzeugen. Immer `scripts/build-release.sh` nutzen
# oder manuell `tools/render-project-yml.sh && xcodegen generate --spec project.generated.yml`.
name: WhisperDictation
options:
  bundleIdPrefix: com.innosolv
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  WhisperDictation:
    type: application
    platform: macOS
    sources:
      - path: Sources/WhisperDictation
        excludes:
          - "WhisperDictation.entitlements"
    dependencies:
      - package: HotKey
      - package: Sparkle
    info:
      path: SupportingFiles/Info.plist
      properties:
        CFBundleDisplayName: "${WD_DISPLAY_NAME}"
        LSUIElement: true
        NSMicrophoneUsageDescription: "InnoWhisper nutzt dein Mikrofon, um Sprache für die Transkription aufzuzeichnen."
        NSAppleEventsUsageDescription: "InnoWhisper fügt transkribierten Text per Tastatur-Simulation in die aktive App ein."
        CFBundleShortVersionString: "1.1.2"
        CFBundleVersion: "21"
        NSHumanReadableCopyright: "© 2026 Timur Mutluer"
        SUFeedURL: "${WD_FEED_URL}"
        SUPublicEDKey: "Em7ytxl6BZIiqy0vtdnlnIOan/WRv7vWPOI/CbmV/hE="
        SUEnableInstallerLauncherService: false
        SUEnableAutomaticChecks: ${WD_SPARKLE_ENABLED}
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${WD_BUNDLE_ID}
        MARKETING_VERSION: "1.1.2"
        CURRENT_PROJECT_VERSION: "21"
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Sources/WhisperDictation/WhisperDictation.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ${WD_APPICON}
