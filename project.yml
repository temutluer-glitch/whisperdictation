name: WhisperDictation
options:
  bundleIdPrefix: com.innosolv
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  WhisperDictation:
    type: application
    platform: macOS
    sources:
      - path: Sources/WhisperDictation
        excludes:
          - "WhisperDictation.entitlements"
    dependencies:
      - package: HotKey
      - package: Sparkle
    info:
      path: SupportingFiles/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "WhisperDictation nutzt dein Mikrofon, um Sprache für die Transkription aufzuzeichnen."
        NSAppleEventsUsageDescription: "WhisperDictation fügt transkribierten Text per Tastatur-Simulation in die aktive App ein."
        CFBundleShortVersionString: "1.1.1"
        CFBundleVersion: "16"
        NSHumanReadableCopyright: "© 2026 Timur Mutluer"
        SUFeedURL: "https://raw.githubusercontent.com/temutluer-glitch/whisperdictation/main/appcast.xml"
        SUPublicEDKey: "Em7ytxl6BZIiqy0vtdnlnIOan/WRv7vWPOI/CbmV/hE="
        SUEnableInstallerLauncherService: false
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innosolv.WhisperDictation
        MARKETING_VERSION: "1.1.1"
        CURRENT_PROJECT_VERSION: "16"
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Sources/WhisperDictation/WhisperDictation.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
